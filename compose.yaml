name: hao-shortlink-dev

services:
  nginx:
    image: ${SHORTLINK_NGINX_IMAGE:-nginx:alpine}
    container_name: hao-shortlink-nginx
    depends_on:
      shortlink_server:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  shortlink_server:
    image: ${SHORTLINK_SERVER_IMAGE:-hao-shortlink-server:dev}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${SHORTLINK_SERVER_BASE_IMAGE:-ubuntu:22.04}
        MUDUO_TARBALL_URL: ${SHORTLINK_MUDUO_TARBALL_URL:-https://github.com/chenshuo/muduo/archive/f1fc77e0c13b80e5086ff457362c8a86d1b609d4.tar.gz}
    container_name: hao-shortlink-server
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:18080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  prometheus:
    image: ${SHORTLINK_PROMETHEUS_IMAGE:-prom/prometheus:v3.13.0}
    container_name: hao-shortlink-prometheus
    depends_on:
      shortlink_server:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - hao_shortlink_prometheus_data:/prometheus

  grafana:
    image: ${SHORTLINK_GRAFANA_IMAGE:-grafana/grafana:12.4.3-security-02}
    container_name: hao-shortlink-grafana
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - hao_shortlink_grafana_data:/var/lib/grafana

  mysql:
    image: ${SHORTLINK_MYSQL_IMAGE:-mysql:8.0}
    container_name: hao-shortlink-mysql
    environment:
      MYSQL_ROOT_PASSWORD: hao_shortlink_root
      MYSQL_DATABASE: hao_shortlink
      MYSQL_USER: hao_shortlink
      MYSQL_PASSWORD: hao_shortlink
    ports:
      - "13306:3306"
    volumes:
      - hao_shortlink_mysql_data:/var/lib/mysql
      - ./apps/shortlink_server/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uhao_shortlink -phao_shortlink --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  redis:
    image: ${SHORTLINK_REDIS_IMAGE:-redis:7-alpine}
    container_name: hao-shortlink-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - hao_shortlink_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  hao_shortlink_mysql_data:
  hao_shortlink_redis_data:
  hao_shortlink_prometheus_data:
  hao_shortlink_grafana_data:
